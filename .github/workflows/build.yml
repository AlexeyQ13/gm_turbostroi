name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  windows-msvc:
    name: Windows MSVC x64
    runs-on: windows-latest
    env:
      GARRYSMOD_COMMON: ${{ github.workspace }}\external\garrysmod_common-x86-64
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Download premake5
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $premakeUrl = 'https://github.com/premake/premake-core/releases/download/v5.0.0-alpha16/premake-5.0.0-alpha16-windows.zip'
          Invoke-WebRequest -Uri $premakeUrl -OutFile premake5.zip
          Expand-Archive premake5.zip -DestinationPath premake5_bin
          Copy-Item premake5_bin\premake5.exe premake5.exe -Force
          Push-Location $env:RUNNER_TEMP
          & "$env:GITHUB_WORKSPACE\premake5.exe" --version
          Pop-Location

      - name: Generate Visual Studio solution
        shell: pwsh
        run: |
          $env:GARRYSMOD_COMMON = "$env:GITHUB_WORKSPACE\external\garrysmod_common-x86-64"
          & "$env:GITHUB_WORKSPACE\premake5.exe" --file=premake5.lua vs2019

      - name: Locate solution
        id: sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path projects\windows -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) { throw 'Solution file not found under projects\\windows' }
          echo "sln=$($sln.FullName)" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $sln = "${{ steps.sln.outputs.sln }}"
          $sd = Split-Path $sln -Parent
          nuget restore "$sln" -NonInteractive -SolutionDirectory "$sd" -PackagesDirectory "$sd\packages"

          # Fix: some projects expect 1.71.0.0 while NuGet lays out as 1.71.0
          $pkgRoot = Join-Path $sd 'packages'
          $pkgs = @('boost-vc142','boost_thread-vc142','boost_date_time-vc142','boost_chrono-vc142','boost_atomic-vc142','boost')
          foreach ($p in $pkgs) {
            $p170  = Join-Path $pkgRoot ($p + '.1.71.0')
            $p1700 = Join-Path $pkgRoot ($p + '.1.71.0.0')

            # Ensure 1.71.0 exists under solution packages (copy from user cache if needed)
            if (-not (Test-Path $p170)) {
              $srcPref = Join-Path $env:USERPROFILE ".nuget\packages\$p\1.71.0"
              if (Test-Path $srcPref) {
                New-Item -ItemType Directory -Force -Path $p170 | Out-Null
                Copy-Item -Path (Join-Path $srcPref '*') -Destination $p170 -Recurse -Force
              }
            }

            # Provide 1.71.0.0 directory by copying (avoid junction permissions)
            if ((Test-Path $p170) -and -not (Test-Path $p1700)) {
              New-Item -ItemType Directory -Force -Path $p1700 | Out-Null
              Copy-Item -Path (Join-Path $p170 '*') -Destination $p1700 -Recurse -Force
            }
          }

          $pkgTargets = Get-ChildItem -Path $pkgRoot -Recurse -Filter boost-vc142.targets -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pkgTargets) {
            Write-Host 'NuGet packages directory content:'
            Get-ChildItem -Recurse -Depth 3 -Path $pkgRoot | Select-Object FullName
            throw 'NuGet restore did not produce expected Boost targets under solution packages folder'
          }

      - name: Build (Release x64)
        shell: pwsh
        run: |
          msbuild "${{ steps.sln.outputs.sln }}" /m /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Collect artifacts
        id: collect
        shell: pwsh
        run: |
          $dlls = Get-ChildItem -Path . -Recurse -Include gmsv_*.dll, *.dll | Where-Object { $_.FullName -match '\\(x64|Release|bin|build)\\' }
          if (-not $dlls) { Write-Host 'No DLLs found; listing tree for debug'; Get-ChildItem -Recurse -Depth 4 | Select-Object FullName; }
          $out = Join-Path $env:RUNNER_TEMP 'artifacts'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          foreach ($d in $dlls) { Copy-Item $d.FullName -Destination $out -Force }
          echo "out=$out" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gmsv_turbostroi-windows-x64
          path: ${{ steps.collect.outputs.out }}
          if-no-files-found: warn