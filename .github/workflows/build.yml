name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  windows-msvc:
    name: Windows MSVC x64
    runs-on: windows-latest
    env:
      GARRYSMOD_COMMON: ${{ github.workspace }}\external\garrysmod_common-x86-64
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Download premake5
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $premakeUrl = 'https://github.com/premake/premake-core/releases/download/v5.0.0-alpha16/premake-5.0.0-alpha16-windows.zip'
          Invoke-WebRequest -Uri $premakeUrl -OutFile premake5.zip
          Expand-Archive premake5.zip -DestinationPath premake5_bin
          Copy-Item premake5_bin\premake5.exe premake5.exe -Force
          Push-Location $env:RUNNER_TEMP
          & "$env:GITHUB_WORKSPACE\premake5.exe" --version
          Pop-Location

      - name: Generate Visual Studio solution
        shell: pwsh
        run: |
          $env:GARRYSMOD_COMMON = "$env:GITHUB_WORKSPACE\external\garrysmod_common-x86-64"
          & "$env:GITHUB_WORKSPACE\premake5.exe" --file=premake5.lua vs2019

      - name: Locate solution
        id: sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path projects\windows -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $sln) { throw 'Solution file not found under projects\windows' }
          echo "sln=$($sln.FullName)" >> $env:GITHUB_OUTPUT

      - name: Normalize NuGet version suffix in vcxproj
        shell: pwsh
        run: |
          $projDir = Split-Path "${{ steps.sln.outputs.sln }}" -Parent
          Get-ChildItem -Path $projDir -Recurse -Filter *.vcxproj | ForEach-Object {
            $p = $_.FullName
            (Get-Content $p -Raw) -replace '\.1\.71\.0\.0', '.1.71.0' | Set-Content -Encoding UTF8 $p
          }

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $sln = "${{ steps.sln.outputs.sln }}"
          $sd = Split-Path $sln -Parent
          $pkgRoot = Join-Path $sd 'packages'
          New-Item -ItemType Directory -Force -Path $pkgRoot | Out-Null
          nuget restore "$sln" -NonInteractive -SolutionDirectory "$sd" -PackagesDirectory "$pkgRoot"

      - name: Fix boost targets path if missing
        shell: pwsh
        run: |
          $sln = "${{ steps.sln.outputs.sln }}"
          $sd = Split-Path $sln -Parent
          $pkgRoot = Join-Path $sd 'packages'
          
          # Define all Boost packages that need targets files
          $boostPackages = @(
            @{ Name = "boost-vc142"; Version = "1.71.0"; TargetsFile = "boost-vc142.targets" },
            @{ Name = "boost"; Version = "1.71.0"; TargetsFile = "boost.targets" },
            @{ Name = "boost_thread-vc142"; Version = "1.71.0"; TargetsFile = "boost_thread-vc142.targets" },
            @{ Name = "boost_date_time-vc142"; Version = "1.71.0"; TargetsFile = "boost_date_time-vc142.targets" },
            @{ Name = "boost_chrono-vc142"; Version = "1.71.0"; TargetsFile = "boost_chrono-vc142.targets" },
            @{ Name = "boost_atomic-vc142"; Version = "1.71.0"; TargetsFile = "boost_atomic-vc142.targets" }
          )
          
          foreach ($package in $boostPackages) {
            $packageDir = "$($package.Name).$($package.Version)"
            $dst = Join-Path $pkgRoot "$packageDir\build\native\$($package.TargetsFile)"
            
            if (-not (Test-Path $dst)) {
              Write-Host "Missing $($package.TargetsFile), attempting to copy from global NuGet cache..."
              $globalPkgPath = Join-Path $env:USERPROFILE ".nuget\packages\$($package.Name)\$($package.Version)"
              $src = Get-ChildItem -Path $globalPkgPath -Recurse -Filter $package.TargetsFile -ErrorAction SilentlyContinue | Select-Object -First 1
              
              if ($src) {
                New-Item -ItemType Directory -Force -Path (Split-Path $dst -Parent) | Out-Null
                Copy-Item -Path $src.FullName -Destination $dst -Force
                Write-Host "Successfully copied $($package.TargetsFile) to $dst"
              } else {
                Write-Host "Could not find $($package.TargetsFile) in global cache at $globalPkgPath"
              }
            } else {
              Write-Host "$($package.TargetsFile) already exists at $dst"
            }
            
            if (-not (Test-Path $dst)) {
              Write-Host "$($package.TargetsFile) still missing at $dst; listing package folder:"
              $packagePath = Join-Path $pkgRoot $packageDir
              if (Test-Path $packagePath) {
                Get-ChildItem -Recurse -Depth 4 -Path $packagePath | Select-Object FullName
              } else {
                Write-Host "Package directory $packagePath does not exist"
              }
              throw "Missing $($package.TargetsFile) after restore"
            }
          }
          
          # Fix Boost include paths - copy from global NuGet cache to packages directory
          Write-Host "Setting up Boost include directories..."
          $globalBoostPath = Join-Path $env:USERPROFILE '.nuget\packages\boost\1.71.0'
          $boostIncludeDst = Join-Path $pkgRoot 'boost.1.71.0'
          
          if (Test-Path $globalBoostPath) {
            # Copy the entire package from global cache to local packages directory
            if (-not (Test-Path $boostIncludeDst)) {
              Write-Host "Copying Boost package from global cache to local packages directory..."
              Copy-Item -Path $globalBoostPath -Destination $boostIncludeDst -Recurse -Force
              Write-Host "Successfully copied Boost package to $boostIncludeDst"
            } else {
              Write-Host "Boost package already exists in local packages directory"
              # Check if include directory exists, if not copy it
              $includeCheck = Get-ChildItem -Path $boostIncludeDst -Recurse -Filter "boost" -Directory -ErrorAction SilentlyContinue
              if (-not $includeCheck) {
                Write-Host "Include directory missing, copying from global cache..."
                $srcLib = Join-Path $globalBoostPath "lib"
                $dstLib = Join-Path $boostIncludeDst "lib"
                if (Test-Path $srcLib) {
                  Copy-Item -Path $srcLib -Destination $dstLib -Recurse -Force
                  Write-Host "Successfully copied include files"
                }
              }
            }
          } else {
            Write-Host "Warning: Could not find Boost package in global NuGet cache at $globalBoostPath"
          }

      - name: Build (Release x64)
        shell: pwsh
        run: |
          $sln = "${{ steps.sln.outputs.sln }}"
          $sd = Split-Path $sln -Parent
          $pkgRoot = Join-Path $sd 'packages'
          msbuild "$sln" /m /p:Configuration=Release /p:Platform=x64 /p:RestorePackagesPath="$pkgRoot" /verbosity:minimal

      - name: Collect artifacts
        id: collect
        shell: pwsh
        run: |
          $dlls = Get-ChildItem -Path . -Recurse -Include gmsv_*.dll, *.dll | Where-Object { $_.FullName -match '\\(x64|Release|bin|build)\\' }
          if (-not $dlls) { Write-Host 'No DLLs found; listing tree for debug'; Get-ChildItem -Recurse -Depth 4 | Select-Object FullName; }
          $out = Join-Path $env:RUNNER_TEMP 'artifacts'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          foreach ($d in $dlls) { Copy-Item $d.FullName -Destination $out -Force }
          echo "out=$out" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gmsv_turbostroi-windows-x64
          path: ${{ steps.collect.outputs.out }}
          if-no-files-found: warn